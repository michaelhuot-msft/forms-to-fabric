# ============================================================================
# Fabric Capacity Management - Scheduled Suspend + Manual Resume
# ============================================================================
#
# Controls Fabric capacity to manage costs (~$260/month for F2 running 24/7).
#
# Schedule:
#   Suspend : 10 PM Central nightly (04:00 UTC, adjusts to 11 PM CDT in summer)
#
# Resume is manual only via workflow_dispatch.
#
# ── Required environment variables (in "production" environment) ───────────
#   AZURE_CLIENT_ID         - App registration (client) ID
#   AZURE_TENANT_ID         - Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID   - Target Azure subscription
#   FABRIC_RESOURCE_GROUP   - Resource group (e.g. "rg-forms-to-fabric-dev")
#   FABRIC_CAPACITY_NAME    - Capacity name (e.g. "formstofabricdev")
# ============================================================================

name: Fabric Capacity

on:
  schedule:
    # Suspend at 04:00 UTC = 10 PM CST / 11 PM CDT, every night
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform on Fabric capacity'
        required: true
        type: choice
        options:
          - resume
          - suspend
          - status

permissions:
  id-token: write
  contents: read

jobs:
  manage-capacity:
    name: >-
      ${{
        github.event_name == 'workflow_dispatch'
          && github.event.inputs.action
          || 'scheduled'
      }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> "$GITHUB_OUTPUT"
          else
            # Scheduled run is always suspend
            echo "action=suspend" >> "$GITHUB_OUTPUT"
          fi

      - name: Get capacity status
        id: status
        run: |
          CAPACITY_URL="https://management.azure.com/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ vars.FABRIC_RESOURCE_GROUP }}/providers/Microsoft.Fabric/capacities/${{ vars.FABRIC_CAPACITY_NAME }}?api-version=2023-11-01"
          STATE=$(az rest --method get --url "$CAPACITY_URL" --query "properties.state" -o tsv 2>/dev/null || echo "Unknown")
          echo "current=$STATE" >> "$GITHUB_OUTPUT"
          echo "::notice::Current capacity state: $STATE"

      - name: Resume capacity
        if: steps.action.outputs.action == 'resume' && steps.status.outputs.current != 'Active'
        run: |
          echo "Resuming capacity '${{ vars.FABRIC_CAPACITY_NAME }}'..."
          az rest --method post \
            --url "https://management.azure.com/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ vars.FABRIC_RESOURCE_GROUP }}/providers/Microsoft.Fabric/capacities/${{ vars.FABRIC_CAPACITY_NAME }}/resume?api-version=2023-11-01"
          echo "::notice::Capacity resumed successfully"

      - name: Skip resume (already active)
        if: steps.action.outputs.action == 'resume' && steps.status.outputs.current == 'Active'
        run: echo "::notice::Capacity is already Active, skipping resume"

      - name: Suspend capacity
        if: steps.action.outputs.action == 'suspend' && steps.status.outputs.current == 'Active'
        run: |
          echo "Suspending capacity '${{ vars.FABRIC_CAPACITY_NAME }}'..."
          az rest --method post \
            --url "https://management.azure.com/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ vars.FABRIC_RESOURCE_GROUP }}/providers/Microsoft.Fabric/capacities/${{ vars.FABRIC_CAPACITY_NAME }}/suspend?api-version=2023-11-01"
          echo "::notice::Capacity suspended successfully"

      - name: Skip suspend (already paused)
        if: steps.action.outputs.action == 'suspend' && steps.status.outputs.current != 'Active'
        run: echo "::notice::Capacity is already ${{ steps.status.outputs.current }}, skipping suspend"

      - name: Report final status
        if: always()
        run: |
          echo "Action: ${{ steps.action.outputs.action }}"
          echo "State before: ${{ steps.status.outputs.current }}"
