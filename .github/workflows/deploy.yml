# ============================================================================
# Healthcare Forms to Fabric — CI/CD
# ============================================================================
#
# This workflow runs on every push and PR targeting `main`:
#   • PR builds  → test + lint only (no deploy)
#   • Push to main → test + lint + deploy to Azure
#
# Azure deployment uses OIDC (federated credentials) so NO secrets are stored
# in GitHub. Authentication is handled via a trust relationship between the
# GitHub repo and an Azure AD app registration.
#
# ── Setting up the GitHub environment & variables ──────────────────────────
#   1. Create an Azure AD app registration and configure a federated
#      credential for the "production" environment in this repository.
#   2. In the repo → Settings → Environments, create an environment named
#      "production".
#   3. Add the following variables (NOT secrets) to the environment:
#        AZURE_CLIENT_ID        – App registration (client) ID
#        AZURE_TENANT_ID        – Azure AD tenant ID
#        AZURE_SUBSCRIPTION_ID  – Target Azure subscription
#        AZURE_ENV_NAME         – azd environment name (e.g. "prod")
#        AZURE_LOCATION         – Azure region (e.g. "eastus")
# ============================================================================

name: Deploy Forms to Fabric

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# OIDC: the id-token permission lets the workflow request a federated token
# from GitHub's OIDC provider — no stored client secrets needed.
permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: '3.11'
  AZD_VERSION: 'latest'

jobs:
  # ── Tests ────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/functions/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=src/functions --cov-report=term-missing
        env:
          PYTHONPATH: src/functions:.

  # ── Linting ──────────────────────────────────────────────────────────────
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: ruff check src/functions/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check src/functions/ tests/

  # ── Bicep Validation ──────────────────────────────────────────────────
  bicep:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: az bicep install

      - name: Lint Bicep templates
        run: az bicep build --file infra/main.bicep --stdout > /dev/null

  # ── Schema Validation ────────────────────────────────────────────────
  schema:
    name: Validate Registry Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Validate form-registry.json against schema
        run: |
          python -c "
          import json, jsonschema
          with open('config/form-registry.json') as f: data = json.load(f)
          with open('src/functions/form-registry.schema.json') as f: schema = json.load(f)
          jsonschema.validate(data, schema)
          print('✅ form-registry.json is valid')
          "

  # ── Credential Scanning ──────────────────────────────────────────────
  secrets:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Deploy ───────────────────────────────────────────────────────────────
  # Runs ONLY on pushes to main, after all checks pass.
  # PR builds never reach this job thanks to the `if` condition below.
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [test, lint, bicep, schema, secrets]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      # OIDC login — exchanges a GitHub-issued JWT for an Azure access token.
      # No client secret is stored; the trust is configured in the Azure AD
      # app registration's federated credential settings.
      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login `
            --client-id "${{ vars.AZURE_CLIENT_ID }}" `
            --federated-credential-provider "github" `
            --tenant-id "${{ vars.AZURE_TENANT_ID }}"
        shell: pwsh

      - name: Deploy Application
        run: azd deploy --no-prompt
        env:
          AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Fabric Workspace
        if: vars.FABRIC_WORKSPACE_ID == ''
        run: |
          pwsh scripts/Setup-FabricWorkspace.ps1 `
            -CapacityId "${{ vars.FABRIC_CAPACITY_ID }}"
        env:
          FUNCTION_APP_PRINCIPAL_ID: ${{ vars.FUNCTION_APP_PRINCIPAL_ID }}
